[build]
builder = "nixpacks"
buildCommand = "npm install"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 100
readinessTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
sleepApplication = false

[build.args]
NODE_ENV = "production"

[build.phases.setup]
cmds = [
    ["npm", "ci", "--production"]
]

[build.phases.install]
cmds = []

[build.phases.build]
cmds = []